# Template: Affiliate Product
# Schema: affiliate-intelligence/schemas/product.schema.yaml
# Copy to: affiliate-intelligence/products/{id}.yaml
#
# Program linkage is per merchant/program pairing—no top-level program_id.

id: prod-{brand}-{sku-slug}
name: ''
slug: ''

brand_id: brand-
merchant_ids:
  - merchant- # authoritative; one product may map to multiple merchants

merchant_program_links:
  - merchant_id: merchant-
    program_id: prog-
    status: active # active | inactive | broken
    notes: ''

sku: ''
gtin: ''

content_crosswalk:
  content_card_ids: [] # pc- prefixed IDs, consistent with brand records
  evidence_record_ids: []
  wordpress_canonical_url: ''

official_product_url: ''

region_links:
  - country_codes: [US]
    merchant_id: merchant- # must match a merchant_program_links entry
    program_id: prog- # must match paired program_id for that merchant
    affiliate_url: ''
    retailer_name: ''
    link_type: direct-brand # direct-brand | network-deep-link | amazon-asin | other
    notes: ''

country_restrictions:
  allowed_country_codes: []
  blocked_country_codes: []
  notes: ''

content_opportunities:
  wordpress: { allowed: true, restrictions: '', notes: '' }
  youtube: { allowed: null, restrictions: '', notes: '' }
  instagram: { allowed: null, restrictions: '', notes: '' }
  facebook: { allowed: null, restrictions: '', notes: '' }
  pinterest: { allowed: null, restrictions: '', notes: '' }
  x: { allowed: null, restrictions: '', notes: '' }

verification:
  status: unverified
  official_source_url: ''
  last_checked_at: YYYY-MM-DD
  evidence_confidence: low
  checked_by: revenue-ops
  notes: ''

status: inactive # inactive | active | broken | retired

notes: ''

created_at: ''
updated_at: ''
