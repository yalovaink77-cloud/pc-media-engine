faq_schema:
  '@context': 'https://schema.org'
  '@type': 'FAQPage'
  mainEntity:
    - '@type': 'Question'
      name: 'Does NeilMed Piercing Aftercare Fine Mist contain 0.9% sodium chloride?'
      acceptedAnswer:
        '@type': 'Answer'
        text: 'That concentration is not verified on the official piercing-aftercare materials and 177 mL label consulted for this review. Check the physical label of the can you purchase; do not rely on this article to assert 0.9%.'
    - '@type': 'Question'
      name: 'How often should I use NeilMed Piercing Aftercare Fine Mist?'
      acceptedAnswer:
        '@type': 'Answer'
        text: 'Official directions say apply as needed and to consult a healthcare professional for continued wound care management. No fixed daily schedule is stated on materials consulted. Follow your piercer and the label.'
    - '@type': 'Question'
      name: 'Is NeilMed Piercing Aftercare the same as APP-preferred packaged sterile saline?'
      acceptedAnswer:
        '@type': 'Answer'
        text: 'It overlaps on packaged sterile saline, water + sodium chloride, preservative-free framing, and spray use, but APP ingredient guidance calls for 0.9% sodium chloride on the wound-wash label—and that figure remains unresolved for this NeilMed SKU on consulted official materials. APP does not endorse brands.'
    - '@type': 'Question'
      name: 'Can I use homemade salt water instead of NeilMed?'
      acceptedAnswer:
        '@type': 'Answer'
        text: 'APP suggested aftercare no longer recommends DIY sea-salt mixes; they are commonly too salty and may over-dry the piercing. Prefer packaged sterile saline wound wash where available, and ask a local piercer if packaged saline is hard to find in your region.'
    - '@type': 'Question'
      name: 'What if I have irritation or worry about infection?'
      acceptedAnswer:
        '@type': 'Answer'
        text: 'Do not self-diagnose from an article. Contact a piercer or healthcare provider for concerning or worsening symptoms.'

