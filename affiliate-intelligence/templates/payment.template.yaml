# Template: Affiliate Payment Terms
# Schema: affiliate-intelligence/schemas/payment.schema.yaml
# Copy to: affiliate-intelligence/payments/{id}.yaml
# NEVER store tax IDs, banking details, API keys, or account numbers.
#
# Scope rule: set exactly ONE of network_id OR program_id (never both).
# Network scope = default terms. Program scope = override only when different.

id: pay-{scope}-{slug}
name: ''

scope_type: network # network | program

# --- set ONE scope field below ---
network_id: net- # required when scope_type is network; omit entirely for program scope
# program_id: prog- # required when scope_type is program; omit entirely for network scope

brand_id: brand- # optional denormalized index
merchant_id: merchant- # optional denormalized index

payout_thresholds:
  - currency: USD
    minimum_amount: 0
    country_codes: [US]
    notes: ''

payment_methods: [] # e.g. paypal, ach, wire, check, payoneer — names only

supported_currencies: [USD]

payout_schedule: ''

country_restrictions:
  allowed_country_codes: []
  blocked_country_codes: []
  notes: ''

verification:
  status: unverified # verified | partially_verified | unverified | deprecated
  source_type: public_documentation # official_program | official_network | official_brand | merchant_email | support_confirmation | legal_terms | public_documentation
  confidence: low # high | medium | low
  official_source_url: ''
  evidence_urls: []
  last_checked: YYYY-MM-DD
  checked_by: revenue-ops
  review_due: YYYY-MM-DD
  notes: ''

status: active # active | historical | unknown
effective_date: YYYY-MM-DD
supersedes: pay-

notes: ''

created_at: ''
updated_at: ''
