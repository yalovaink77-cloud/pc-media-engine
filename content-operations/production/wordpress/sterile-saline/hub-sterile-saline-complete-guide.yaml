faq_schema:
  '@context': 'https://schema.org'
  '@type': 'FAQPage'
  mainEntity:
    - '@type': 'Question'
      name: 'What is sterile saline for piercing aftercare?'
      acceptedAnswer:
        '@type': 'Answer'
        text: 'In piercing aftercare, packaged sterile saline usually means a ready-to-use sterile sodium chloride solution sold as a spray, mist, or wash—not something you measure and mix at home. Professional aftercare guidance from the Association of Professional Piercers (APP) strongly encourages use of a sterile saline labeled for wound wash, with ingredients listing 0.9% sodium chloride as the only ingredient (sometimes purified water is also listed). That is category guidance, not a product endorsement.'
    - '@type': 'Question'
      name: 'Why does 0.9% sodium chloride matter for wound-wash saline?'
      acceptedAnswer:
        '@type': 'Answer'
        text: '0.9% sodium chloride is the concentration APP aftercare guidance looks for on a wound-wash saline label. In plain language, that concentration is often described as isotonic—matched to fluid balance in body tissues—so the rinse is less likely to over-dry or over-salt the site the way a DIY mix can. Do not assume every product marketed as piercing saline has verified 0.9% on the label for the SKU you buy.'
    - '@type': 'Question'
      name: 'Can I use homemade salt water instead of packaged sterile saline?'
      acceptedAnswer:
        '@type': 'Answer'
        text: 'APP suggested aftercare no longer recommends mixing your own sea-salt solution. DIY mixes are commonly too salty and may over-dry the piercing and interfere with healing. If packaged sterile saline is not available in your region, APP guidance focuses on keeping the piercing clean via shower rinsing and checking with a local piercer for regional suggestions.'
    - '@type': 'Question'
      name: 'How often should I use sterile saline on a piercing?'
      acceptedAnswer:
        '@type': 'Answer'
        text: 'There is no fixed universal rinse schedule in APP body-piercing aftercare for all piercings. Product materials for category examples typically say apply as needed or as directed by a piercer or healthcare professional. Follow your piercer, the product label, and a healthcare provider when needed. APP also warns against over-cleaning.'
    - '@type': 'Question'
      name: 'Does sterile saline prevent infection or guarantee faster healing?'
      acceptedAnswer:
        '@type': 'Answer'
        text: 'Verified professional guidance and manufacturer pages consulted for this cluster do not support claims that sterile saline prevents infection, guarantees faster healing, fixes poor placement or unsuitable jewelry, or works the same for every piercing, person, or stage of healing. Saline is a rinse category, not a cure-all.'
    - '@type': 'Question'
      name: 'When should I seek professional help for a piercing?'
      acceptedAnswer:
        '@type': 'Answer'
        text: 'Contact your piercer or a healthcare provider if you notice concerning or worsening changes—for example increasing pain, swelling, or redness; unusual discharge, odor, heat, or fever; or jewelry that will not move normally or appears embedded. This guide does not diagnose infection, irritation, or other conditions.'

