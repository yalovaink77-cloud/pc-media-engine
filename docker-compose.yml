# Local development infrastructure — Sprint 48 enhanced
#
# Starts PostgreSQL and Redis only. Run API, Worker, and Dashboard on the host:
#   pnpm install && pnpm build
#   pnpm --filter @pcme/api dev
#   pnpm --filter @pcme/worker dev
#   pnpm --filter @pcme/dashboard dev
#
# Requires .env (copy from .env.example): cp .env.example .env
#
# Production deployment: see deploy/compose/docker-compose.production.yml

name: pcme-dev

networks:
  pcme_dev:
    name: pcme_dev
    driver: bridge

services:
  postgres:
    image: postgres:16-alpine
    container_name: pcme-postgres
    restart: unless-stopped
    networks: [pcme_dev]
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pcme_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: pcme-redis
    restart: unless-stopped
    networks: [pcme_dev]
    ports:
      - '6379:6379'
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - pcme_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  pcme_postgres_data:
  pcme_redis_data:
