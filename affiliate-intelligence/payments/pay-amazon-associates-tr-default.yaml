id: pay-amazon-associates-tr-default
name: Amazon Associates Türkiye — default payout (TR tax residents)

scope_type: network
network_id: net-amazon-associates

payout_thresholds:
  - currency: TRY
    minimum_amount: 100
    country_codes: [TR]
    notes: >
      Direct deposit or Amazon.com gift card threshold. Cheque threshold is 1000 TRY
      per Amazon Türkiye help—PC default path unresolved.
  - currency: TRY
    minimum_amount: 1000
    country_codes: [TR]
    notes: Cheque payment method threshold only—not default path.

payment_methods:
  - direct-deposit
  - amazon-gift-card
  - cheque

supported_currencies:
  - TRY

payout_schedule: >
  Monthly when balance meets threshold; paid approximately 60 days after month-end
  (e.g. January earnings paid late March). Tax information required before payout.

verification:
  status: verified
  source_type: official_program
