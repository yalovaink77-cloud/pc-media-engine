id: pay-impact-default
name: Impact — default partner payout

scope_type: network
network_id: net-impact

payout_thresholds:
  - currency: USD
    minimum_amount: 10
    notes: Minimum withdrawal threshold; currency equivalent applies.
  - currency: TRY
    minimum_amount: null
    country_codes: [TR]
    notes: >
      TRY is a wire-supported currency with Turkey as supported bank account location per
      Impact Supported Currencies. Exact TRY autopay minimum equivalent unresolved—USD 10
      baseline applies in account currency.

payment_methods:
  - bank-transfer
  - wire

supported_currencies:
  - USD
  - TRY

payout_schedule: >
  Autopay on balance threshold (min USD 10) processed Tuesday/Thursday following
  trigger, or fixed day 1st/15th when balance exceeds minimum. Tax forms required
  before payout. International wire/EFT when impact.com does not hold a local account.

verification:
