  review_due: 2026-10-15
  notes: >
    Minimum thresholds from Amazon Türkiye help. Applies when enrolling via
    gelirortakligi.amazon.com.tr as TR tax-registered publisher.

status: active
effective_date: 2026-07-15

notes: >
  TR tax-resident publishers use Amazon Türkiye Gelir Ortaklığı portal. US Associates
