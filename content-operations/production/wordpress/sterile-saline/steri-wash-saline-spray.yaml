faq_schema:
  '@context': 'https://schema.org'
  '@type': 'FAQPage'
  mainEntity:
    - '@type': 'Question'
      name: 'Is Steri-Wash 0.9% sodium chloride?'
      acceptedAnswer:
        '@type': 'Answer'
        text: 'Yes for the verified 4.25 oz back label (Purified Water, 0.9% USP NaCl; isotonic label wording). Not verified here for 3 oz or 8 oz. Check the can you buy. Do not rely on wholesale .09% marketing copy as proof.'
    - '@type': 'Question'
      name: 'How often should I use Steri-Wash?'
      acceptedAnswer:
        '@type': 'Answer'
        text: 'APP guidance does not give a fixed universal daily schedule for all piercings. Follow your piercer and the directions on the specific Steri-Wash SKU.'
    - '@type': 'Question'
      name: 'Is Steri-Wash the same as APP-preferred packaged sterile saline?'
      acceptedAnswer:
        '@type': 'Answer'
        text: 'It overlaps on packaged sterile saline, water + sodium chloride, no drugs/preservatives, and spray use. 0.9% is documented on the 4.25 oz label; full-line concentration match is unresolved. APP does not endorse brands.'
    - '@type': 'Question'
      name: 'Can I use homemade salt water instead of Steri-Wash?'
      acceptedAnswer:
        '@type': 'Answer'
        text: 'APP suggested aftercare no longer recommends DIY sea-salt mixes; they are commonly too salty and may over-dry the piercing. Prefer packaged sterile saline wound wash where available.'
    - '@type': 'Question'
      name: 'What if I have irritation or worry about infection?'
      acceptedAnswer:
        '@type': 'Answer'
        text: 'Do not self-diagnose from an article. Contact a piercer or healthcare provider for concerning or worsening symptoms.'

