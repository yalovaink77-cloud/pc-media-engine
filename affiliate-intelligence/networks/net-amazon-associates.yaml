notes: >
  Sprint 006 (2026-07-15): Turkey publisher eligibility confirmed for Amazon Türkiye Gelir
  Ortaklığı—TR tax-registered individuals, sole proprietors, or businesses required; non-tax
  exempt individuals cannot participate. US Associates portal also lists Turkey as signup
  country; PC default path is TR portal when tax-resident in Turkey.
  Application URLs: https://gelirortakligi.amazon.com.tr/ (TR tax residents);
  https://affiliate-program.amazon.com/welcome/info4 (Turkey listed on US portal).
  Traffic/site: original public content; websites need ~10 posts within 60 days; 3 qualifying
  sales within 180 days trigger application review; social requires full profile URL and
  typically ≥500 organic followers (Facebook public pages/groups, Instagram, Twitter/X,
  YouTube, Twitch only).
  Tax: tax interview required; manual or automatic invoicing per TR tax status; withholding
  rules documented in TR billing help—do not store tax IDs here.
  Cookie/commission rates: not documented in this sprint (no guessing).
  Sprint 006-B (2026-07-15): Keep marketplace-specific—TR tax residents use Amazon Türkiye
  Gelir Ortaklığı and TRY payout terms, not assumed US Associates banking. Tax verification
  remains a hard prerequisite (TR tax registration + tax interview). PayPal is not an Amazon
  TR payout method and is unavailable to Turkey-resident publishers generally.

