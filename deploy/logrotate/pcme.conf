# PC Media Engine — log rotation (Sprint 48)
#
# Install on host:
#   sudo cp deploy/logrotate/pcme.conf /etc/logrotate.d/pcme
#
# Adjust paths to match your Docker log driver or bind-mounted log directory.

/var/lib/docker/containers/*pcme*/*.log
/var/log/pcme/*.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    maxsize 100M
}
