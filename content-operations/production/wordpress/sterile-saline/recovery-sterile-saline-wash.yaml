faq_schema:
  '@context': 'https://schema.org'
  '@type': 'FAQPage'
  mainEntity:
    - '@type': 'Question'
      name: 'Does Recovery Sterile Saline Wash 7.4 oz contain 0.9% sodium chloride?'
      acceptedAnswer:
        '@type': 'Answer'
        text: 'Official 7.4 oz SDS Section 1 lists the synonym Sterile Saline Wound Wash 0.9%. This review does not claim a quantitative Section 3 water/NaCl percentage table or verified CoA composition text.'
    - '@type': 'Question'
      name: 'How often should I use Recovery Sterile Saline Wash?'
      acceptedAnswer:
        '@type': 'Answer'
        text: 'Official instructions: as often as needed or as directed by your piercer. APP guidance does not give a fixed universal daily schedule for all piercings.'
    - '@type': 'Question'
      name: 'Is the Purified Saline Wash MSDS the same document as the 7.4 oz Sterile Saline Wash SDS?'
      acceptedAnswer:
        '@type': 'Answer'
        text: 'No. Resources-page Purified Saline Wash MSDS covers 1.5 oz / 4 oz sizing and is a separate path from the 7.4 oz Sterile Saline Wash SDS linked on the MED-637 product page.'
    - '@type': 'Question'
      name: 'Is Recovery Sterile Saline Wash APP-endorsed?'
      acceptedAnswer:
        '@type': 'Answer'
        text: 'No. APP guidance is formulation-based and does not endorse brands. SDS wound-wash / 0.9% synonym is manufacturer documentation—not APP approval.'
    - '@type': 'Question'
      name: 'Can I use homemade salt water instead of Recovery?'
      acceptedAnswer:
        '@type': 'Answer'
        text: 'APP suggested aftercare no longer recommends DIY sea-salt mixes; they are commonly too salty and may over-dry the piercing. Prefer packaged sterile saline wound wash where available.'
    - '@type': 'Question'
      name: 'What if I have irritation or worry about infection?'
      acceptedAnswer:
        '@type': 'Answer'
        text: 'Do not self-diagnose from an article. Contact a piercer or healthcare provider for concerning or worsening symptoms. Follow product IFU to discontinue and seek care if irritation develops.'

