traffic_requirements_notes: >
  Amazon TR: ~10 posts within 60 days; 3 qualifying sales within 180 days; social channels
  require full profile URL and typically ≥500 organic followers (Facebook public pages/groups,
  Instagram, Twitter/X, YouTube, Twitch). Awin: promotional space URL + description. Impact:
  verified media property recommended; ~72 h marketplace review. Partnerize: per-advertiser
  campaign approval. FlexOffers/Sovrn/CJ/Rakuten/Skimlinks: see eligibility report—do not
  prioritize until TR payout path confirmed (Skimlinks TR payout unusable).

