# PiercingConnect Affiliate Intelligence — Program Schema
# Version: 0.2
#
# Enrolled or tracked affiliate program—network-based or direct brand program.

$schema: 'https://json-schema.org/draft/2020-12/schema'
$id: 'https://piercingconnect.com/schemas/affiliate-intelligence/program/v1'
title: AffiliateProgram
description: Active or historical affiliate program enrollment with terms snapshots and regional variants.
type: object
required:
  - id
  - name
  - slug
  - brand_id
  - merchant_id
  - program_type
  - status
  - verification
  - created_at
  - updated_at

properties:
  id:
    type: string
    pattern: '^prog-[a-z0-9]+(?:-[a-z0-9]+)*$'
    examples:
      - prog-neilmed-shareasale-us
      - prog-h2ocean-direct-global

  name:
    type: string
    minLength: 2
    maxLength: 160

  slug:
    type: string
    pattern: '^[a-z0-9]+(?:-[a-z0-9]+)*$'

  brand_id:
    type: string
    pattern: '^brand-[a-z0-9]+(?:-[a-z0-9]+)*$'
    description: Authoritative foreign key—program owns the brand relationship.

  merchant_id:
    type: string
    pattern: '^merchant-[a-z0-9]+(?:-[a-z0-9]+)*$'
    description: Authoritative foreign key—program owns the merchant relationship.

  network_id:
    type:
      - string
      - 'null'
    pattern: '^net-[a-z0-9]+(?:-[a-z0-9]+)*$'
    description: Authoritative foreign key; null for direct brand programs (no intermediary network).

  program_type:
    type: string
    enum:
      - network
      - direct

  application_id:
    type: string
    pattern: '^app-[a-z0-9]+(?:-[a-z0-9]+)*$'

  status:
    type: string
    enum:
      - pending
      - active
      - paused
      - terminated

  editorial_approved:
    type: boolean
    description: True only after editorial-lead sign-off for link placement.

  current_commission_id:
    type: string
    pattern: '^comm-[a-z0-9]+(?:-[a-z0-9]+)*$'

  commission_ids:
    type: array
    description: Denormalized index only. Authoritative link is commission.program_id.
    items:
      type: string
      pattern: '^comm-[a-z0-9]+(?:-[a-z0-9]+)*$'

  product_ids:
    type: array
    description: >
      Denormalized index only. Authoritative links are product.merchant_program_links
      and product.merchant_ids.
    items:
      type: string
      pattern: '^prod-[a-z0-9]+(?:-[a-z0-9]+)*$'

  payment_id:
    type: string
    pattern: '^pay-[a-z0-9]+(?:-[a-z0-9]+)*$'
    description: >
      Optional program-level payment override. When absent, inherit from network payment
      record referenced by network_id (see architecture.md payment inheritance).

  region_programs:
    type: array
    description: Region-specific program URLs and enrollment variants.
    items:
      type: object
      required:
        - country_codes
      properties:
        region_label:
          type: string
          examples:
            - US
            - EU-DE
            - Global
        country_codes:
          type: array
          minItems: 1
          items:
            type: string
            pattern: '^[A-Z]{2}$'
        program_portal_url:
          type: string
          format: uri
          description: Publisher-facing program page for this region.
        link_base_url:
          type: string
          format: uri
          description: Documented link pattern base—no tracking secrets or subIDs.
        currency:
          type: string
          pattern: '^[A-Z]{3}$'
        notes:
          type: string

  country_restrictions:
    $ref: '#/$defs/countryRestrictions'

  application_eligibility:
    $ref: '#/$defs/applicationEligibility'

  content_opportunities:
    $ref: '#/$defs/contentOpportunities'

  disclosure:
    type: object
    properties:
      template_id:
        type: string
        pattern: '^policy-[a-z0-9]+(?:-[a-z0-9]+)*$'
        description: Reference to policies/{id}.yaml disclosure record.
      custom_copy:
        type: string
        description: Program-specific disclosure addendum if required.

  verification:
    $ref: '#/$defs/verification'

  notes:
    type: string

  created_at:
    type: string
    format: date-time

  updated_at:
    type: string
    format: date-time

$defs:
  verification:
    $ref: 'verification.schema.yaml'

  countryRestrictions:
    type: object
    properties:
      allowed_country_codes:
        type: array
        items:
          type: string
          pattern: '^[A-Z]{2}$'
      blocked_country_codes:
        type: array
        items:
          type: string
          pattern: '^[A-Z]{2}$'
      notes:
        type: string

  applicationEligibility:
    type: object
    properties:
      open_to_new_publishers:
        type: boolean
      traffic_requirements:
        type: string
      content_requirements:
        type: array
        items:
          type: string
      prohibited_traffic:
        type: array
        items:
          type: string
      notes:
        type: string

  contentOpportunities:
    type: object
    properties:
      wordpress:
        $ref: '#/$defs/platformOpportunity'
      youtube:
        $ref: '#/$defs/platformOpportunity'
      instagram:
        $ref: '#/$defs/platformOpportunity'
      facebook:
        $ref: '#/$defs/platformOpportunity'
      pinterest:
        $ref: '#/$defs/platformOpportunity'
      x:
        $ref: '#/$defs/platformOpportunity'

  platformOpportunity:
    type: object
    properties:
      allowed:
        type: boolean
      restrictions:
        type: string
      notes:
        type: string

additionalProperties: false
