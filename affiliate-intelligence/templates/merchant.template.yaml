# Do not store credentials, tax IDs, or banking details.

id: merchant-{brand}-{channel}
name: ''
slug: ''

brand_id: brand-
channel_type: network # network | direct
network_id: net- # null when channel_type is direct

external_merchant_id: ''

program_ids: []
product_ids: []

