verification:
  status: unverified # verified | partially_verified | unverified | deprecated
  source_type: public_documentation # official_program | official_network | official_brand | merchant_email | support_confirmation | legal_terms | public_documentation
  confidence: low # high | medium | low
  official_source_url: ''
  evidence_urls: []
  last_checked: YYYY-MM-DD
