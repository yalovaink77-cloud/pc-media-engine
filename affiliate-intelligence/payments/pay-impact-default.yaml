    - https://www.paypal.com/tr/webapps/mpp/country-worldwide
  last_checked: 2026-07-15
  checked_by: revenue-ops
  review_due: 2026-10-15
  notes: >
    Sprint 006-B: Non-PayPal TR path confirmed via TRY + Turkey bank location under wire.
    PayPal is a platform method but unavailable for Turkey-resident publishers.

status: active
effective_date: 2026-07-15

notes: >
  Turkey in impact.com partner signup country lists. Use bank wire/EFT only for TR-resident
