affiliate_notes:
  disclosure_requirements_summary: >
    Unresolved for TR-specific commercial disclosure law. Amazon TR and network TOS require
    clear affiliate disclosure on links and social posts. FTC-style rules apply on US-facing
    programs—treat as editorial requirement regardless of local statute research gap.
  common_network_availability: >
    Sprint 006-B (2026-07-15): PayPal unavailable for Turkey-resident publishers (PayPal
    Turkey suspension notice). Usable networks with confirmed non-PayPal payout paths:
    Amazon TR, Awin (Payoneer), Impact (TRY wire), Partnerize (electronic transfer).
    Conditional: FlexOffers, Sovrn (non-PayPal TR path unconfirmed), CJ, Rakuten (enrollment
    unresolved). Unusable for TR payout: Skimlinks (PayPal-only outside US/EU/UK).
    TR tax registration required for Amazon Türkiye Gelir Ortaklığı.
  piercing_content_caution: >
    No network-level piercing ban found in official docs reviewed. Avoid medical cure/treatment
    claims; disclose affiliate links; confirm per-advertiser program terms before aftercare
    monetization. Skimlinks does not monetize Amazon links and is unusable for TR payouts.

