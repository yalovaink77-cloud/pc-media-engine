faq_schema:
  '@context': 'https://schema.org'
  '@type': 'FAQPage'
  mainEntity:
    - '@type': 'Question'
      name: 'Is H2Ocean the same as sterile 0.9% sodium chloride wound wash?'
      acceptedAnswer:
        '@type': 'Answer'
        text: 'Not verified. Official formula is purified water, sea salt, lysozyme, and sodium citrate. Sterile 0.9% NaCl isotonic saline labeling is not verified on official pages consulted for this review.'
    - '@type': 'Question'
      name: 'Does APP recommend or endorse H2Ocean?'
      acceptedAnswer:
        '@type': 'Answer'
        text: "APP does not endorse brands. APP encourages sterile saline labeled for wound wash with 0.9% sodium chloride (sometimes with purified water). H2Ocean's documented formula differs from that baseline."
    - '@type': 'Question'
      name: 'How often should I use H2Ocean Piercing Aftercare Spray?'
      acceptedAnswer:
        '@type': 'Answer'
        text: 'Official shop meta copy recommends 3–6 times daily to remove discharge and debris—that is manufacturer marketing, not APP body-piercing schedule guidance. APP does not specify a fixed universal daily count and warns against over-cleaning. Follow your piercer and the product label.'
    - '@type': 'Question'
      name: 'Can I use homemade salt water instead of H2Ocean?'
      acceptedAnswer:
        '@type': 'Answer'
        text: 'APP suggested aftercare no longer recommends DIY sea-salt mixes; they are commonly too salty and may over-dry the piercing. Prefer packaged sterile saline wound wash where that is the piercer-recommended approach.'
    - '@type': 'Question'
      name: 'What if I have irritation or worry about infection?'
      acceptedAnswer:
        '@type': 'Answer'
        text: 'Do not self-diagnose from an article. Contact a piercer or healthcare provider for concerning or worsening symptoms.'

